server {
    listen       8080;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — no cache (small app, config-driven)
    location ~* \.(css|js|svg|png|ico|woff2?)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Config file — never cache
    location /config/ {
        alias /config/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # METAR proxy for QNH (aviationweather.gov has no CORS)
    location /api/metar {
        resolver 127.0.0.11 8.8.8.8 valid=30s;
        set $metar_backend "https://aviationweather.gov/api/data/metar";
        set $metar_args "format=json&$args";
        proxy_pass $metar_backend?$metar_args;
        proxy_ssl_server_name on;
        proxy_set_header Host aviationweather.gov;
        proxy_set_header Accept application/json;
        add_header Cache-Control "public, max-age=300";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
