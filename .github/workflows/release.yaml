name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          helm package helm/squawk --version ${GITHUB_REF_NAME#v} --app-version ${GITHUB_REF_NAME#v}

      - name: Push chart to OCI registry
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push squawk-*.tgz oci://ghcr.io/${OWNER}/charts

      - name: Upload chart to release
        uses: softprops/action-gh-release@v2
        with:
          files: squawk-*.tgz

  charts:
    runs-on: ubuntu-latest
    needs: helm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          helm package helm/squawk --version ${VERSION} --app-version ${VERSION}

      - name: Clone charts repo
        run: |
          git clone --branch gh-pages https://x-access-token:${{ secrets.CHARTS_TOKEN }}@github.com/vojtechpastyrik/charts.git charts-repo

      - name: Update Helm repo index
        run: |
          cp squawk-*.tgz charts-repo/
          cd charts-repo
          if [ -f index.yaml ]; then
            helm repo index . --url https://vojtechpastyrik.github.io/charts --merge index.yaml
          else
            helm repo index . --url https://vojtechpastyrik.github.io/charts
          fi

      - name: Push to charts repo
        run: |
          cd charts-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml squawk-*.tgz
          git commit -m "squawk ${GITHUB_REF_NAME}"
          git push
